---
services:
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    expose:
      - "8080"
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    networks:
      web:
        aliases:
          - dozzle

networks:
  web:
    external: true
