---
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ../config/runtime/caddy.env
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
      DOZZLE_DOMAIN: ${DOZZLE_DOMAIN:?DOZZLE_DOMAIN is required}
      EXAMPLE_APP_DOMAIN: ${EXAMPLE_APP_DOMAIN:?EXAMPLE_APP_DOMAIN is required}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?BASIC_AUTH_USER is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/etc/caddy/sites:ro
      - ./data:/data
      - ./config:/config
    networks:
      - web

networks:
  web:
    external: true
