---
services:
  example-app:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
    expose:
      - "80"
    networks:
      web:
        aliases:
          - example-app
      internal:

networks:
  web:
    external: true
  internal:
    external: true
